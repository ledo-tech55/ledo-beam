version: '3.8'

services:
  backend:
    build:
      context: ./LedoBeam.Backend
    image: ledo-beam-backend:latest
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080

  frontend:
    build:
      context: ./ledo-beam-ui
    image: ledo-beam-frontend:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
