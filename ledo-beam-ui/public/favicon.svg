<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#00D2FF"/>
    </linearGradient>
    <linearGradient id="beam" x1="32" y1="8" x2="32" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)"/>
  
  <!-- Beam icon: vertical line with arrows -->
  <g stroke="url(#beam)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top arrow (upload) -->
    <path d="M32 14 L32 50"/>
    <path d="M22 24 L32 14 L42 24"/>
    <!-- Bottom arrow (download) -->
    <path d="M22 40 L32 50 L42 40"/>
  </g>
  
  <!-- Dots representing peers -->
  <circle cx="14" cy="32" r="3" fill="white" opacity="0.8"/>
  <circle cx="50" cy="32" r="3" fill="white" opacity="0.8"/>
  
  <!-- Connection dashes -->
  <line x1="18" y1="32" x2="28" y2="32" stroke="white" stroke-width="2" stroke-dasharray="3 3" opacity="0.5"/>
  <line x1="36" y1="32" x2="46" y2="32" stroke="white" stroke-width="2" stroke-dasharray="3 3" opacity="0.5"/>
</svg>